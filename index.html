<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>profile site</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: monospace;
}

body {
    background: black;
    color: white;
    overflow: hidden;
}

/* background */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.35;
    z-index: -1;
}

/* main card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 15px;
    width: 380px;
    text-align: center;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 2px solid white;
    margin-bottom: 10px;
}

h1 {
    font-size: 24px;
}

p {
    opacity: 0.8;
    margin-bottom: 10px;
}

/* button */
button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    margin: 5px;
}

/* skills */
.skills {
    display: none;
    margin-top: 10px;
    text-align: left;
}

.bar {
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-bottom: 8px;
}

.fill {
    height: 100%;
    background: white;
}

/* SOCIAL SCROLL SECTION */
.scroll-box {
    position: fixed;
    bottom: 20px;
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
}

.scroll-track {
    display: inline-block;
    animation: scroll 12s linear infinite;
}

.person {
    display: inline-block;
    margin-right: 60px;
    padding: 10px 15px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
}

.person b {
    color: white;
}

.person span {
    display: block;
    font-size: 12px;
    opacity: 0.7;
}

/* animation */
@keyframes scroll {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<!-- background -->
<video autoplay loop muted>
    <source src="background.mp4" type="video/mp4">
</video>

<!-- main card -->
<div class="card">
    <img src="profile.png">
    <h1>My Profile</h1>
    <p>cool website</p>

    <button onclick="toggle()">Skills</button>

    <div class="skills" id="skills">

        <div>HTML</div>
        <div class="bar"><div class="fill" style="width:80%"></div></div>

        <div>CSS</div>
        <div class="bar"><div class="fill" style="width:70%"></div></div>

        <div>JavaScript</div>
        <div class="bar"><div class="fill" style="width:60%"></div></div>

    </div>
</div>

<!-- SCROLLING PEOPLE -->
<div class="scroll-box">
    <div class="scroll-track">

        <div class="person">
            <b>Zilo</b>
            <span>the best discord moderation for moderating servers</span>
        </div>

        <div class="person">
            <b>Rome</b>
            <span>comp gorilla tag player and is a cool dude</span>
        </div>

        <div class="person">
            <b>Horizon</b>
            <span>the best teen gorilla tag player</span>
        </div>

        <div class="person">
            <b>Jetto</b>
            <span>the best upcoming gorilla tag streamer</span>
        </div>

    </div>
</div>

<script>
function toggle() {
    const s = document.getElementById("skills");
    s.style.display = (s.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
