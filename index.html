<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my profile</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: monospace;
}

body {
    background: black;
    color: white;
    overflow: hidden;
}

/* background */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0.4;
}

/* center card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

/* profile pic */
img.profile {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid white;
    margin-bottom: 10px;
}

/* name */
h1 {
    font-size: 24px;
    margin-bottom: 5px;
}

p {
    opacity: 0.8;
    margin-bottom: 15px;
}

/* buttons */
button {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    margin: 5px;
}

button:hover {
    background: rgba(255,255,255,0.2);
}

/* skills */
.skills {
    display: none;
    margin-top: 10px;
    text-align: left;
}

.bar {
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: white;
}

.socials a {
    color: white;
    text-decoration: none;
    margin: 5px;
    display: inline-block;
    opacity: 0.8;
}

.socials a:hover {
    opacity: 1;
}
</style>
</head>

<body>

<!-- background video (replace file if you want) -->
<video autoplay loop muted>
    <source src="background.mp4" type="video/mp4">
</video>

<div class="card">

    <img class="profile" src="profile.png">

    <h1>your name</h1>
    <p>about you goes here</p>

    <button onclick="toggleSkills()">Skills</button>

    <div class="skills" id="skills">

        <div>HTML</div>
        <div class="bar"><div class="fill" style="width:80%"></div></div>

        <div>CSS</div>
        <div class="bar"><div class="fill" style="width:70%"></div></div>

        <div>JavaScript</div>
        <div class="bar"><div class="fill" style="width:60%"></div></div>

    </div>

    <div class="socials">
        <a href="#">Discord</a>
        <a href="#">GitHub</a>
        <a href="#">YouTube</a>
    </div>

</div>

<script>
function toggleSkills() {
    const s = document.getElementById("skills");
    s.style.display = (s.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
